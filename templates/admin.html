{{define "content"}}
<section class="page-head">
  <div>
    <h1>Super admin</h1>
    <p class="muted">All organizations on this instance.</p>
  </div>
  <button class="btn btn-primary" type="button" onclick="document.getElementById('new-org-form').showModal()">New organization</button>
</section>

<table class="data-table">
  <thead><tr><th>Name</th><th>Slug</th><th>Members</th><th>Domains</th><th>Keys</th><th>Created</th></tr></thead>
  <tbody>
  {{range .AllOrgs}}
  <tr>
    <td><a href="/orgs/{{.Slug}}">{{.Name}}</a></td>
    <td class="muted">{{.Slug}}</td>
    <td>{{.MemberCount}}</td>
    <td>{{.DomainCount}}</td>
    <td>{{.KeyCount}}</td>
    <td class="muted">{{.CreatedDisplay}}</td>
  </tr>
  {{else}}
  <tr><td colspan="6" class="empty">No organizations yet.</td></tr>
  {{end}}
  </tbody>
</table>

<dialog id="new-org-form" class="modal">
  <form method="POST" action="/admin/orgs">
    <h2>New organization</h2>
    <label><span>Name</span><input type="text" name="name" placeholder="Acme Inc" required></label>
    <label><span>Slug (URL)</span><input type="text" name="slug" placeholder="acme (leave blank to derive from name)"></label>
    <label><span>Owner email (must already be a user)</span><input type="email" name="owner_email" placeholder="owner@acme.com"></label>
    <label><span>Default daily limit per key</span><input type="number" name="default_daily_limit" value="100" min="1" required></label>
    <label><span>Default monthly limit per key</span><input type="number" name="default_monthly_limit" value="1000" min="1" required></label>
    <div class="modal-actions">
      <button type="button" class="btn btn-ghost" onclick="this.closest('dialog').close()">Cancel</button>
      <button type="submit" class="btn btn-primary">Create</button>
    </div>
  </form>
</dialog>
{{end}}
