services:
  emaild:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/anchoo2kewl/go-email:latest
    container_name: emaild
    restart: unless-stopped
    ports:
      - "127.0.0.1:8096:8095"  # host 8096 → container 8095
    extra_hosts:
      # Lets the container reach the host's public ports (Mailcow SMTP on :587)
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/data
    environment:
      PORT: "8095"
      DB_PATH: "/data/emaild.db"
      SMTP_HOST: "${SMTP_HOST:?SMTP_HOST is required}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USERNAME: "${SMTP_USERNAME:?SMTP_USERNAME is required}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:?SMTP_PASSWORD is required}"
      SMTP_SKIP_VERIFY: "${SMTP_SKIP_VERIFY:-false}"
      BOOTSTRAP_ADMIN_EMAIL: "${BOOTSTRAP_ADMIN_EMAIL:-anshuman@biswas.me}"
      BOOTSTRAP_ADMIN_PASSWORD: "${BOOTSTRAP_ADMIN_PASSWORD:-}"
      BOOTSTRAP_ORG_NAME: "${BOOTSTRAP_ORG_NAME:-biswas-me}"
      BOOTSTRAP_ORG_SLUG: "${BOOTSTRAP_ORG_SLUG:-biswas-me}"
      BOOTSTRAP_DOMAIN: "${BOOTSTRAP_DOMAIN:-pingrly.com}"
      SERVER_IP: "${SERVER_IP:-}"
      DMARC_REPORT_TO: "${DMARC_REPORT_TO:-}"
      COOKIE_SECURE: "true"
